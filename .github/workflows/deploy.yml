name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'

env:
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/loomic-server
jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          TLS_CERT: ${{ secrets.TLS_CERT }}
          TLS_KEY: ${{ secrets.TLS_KEY }}
          GAR_IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GAR_REPO }}/loomic-server:latest
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: ENV_FILE,TLS_CERT,TLS_KEY,GAR_IMAGE
          script: |
            cd /home/g12g23raj_nes/Loomic/server

            # Write .env file from secret
            echo "$ENV_FILE" > .env
            chmod 600 .env

            # Write TLS certificates from secrets
            mkdir -p certs
            echo "$TLS_CERT" | base64 -d > certs/server.crt
            echo "$TLS_KEY" | base64 -d > certs/server.key
            chmod 600 certs/server.key

            # Authenticate Docker on VM
            gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

            # Pull latest image
            docker pull $GAR_IMAGE

            # Restart with new image, force recreate to replace running container
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            # Clean up old images
            docker image prune -f
