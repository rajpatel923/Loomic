services:
  server:
    image: ${GAR_IMAGE}
    ports:
      - "7777:7777"
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./config:/app/config   # mount local config so it's easy to edit
      - ./logs:/app/logs        # persist logs on host
      - ./certs:/app/certs      # dev TLS certificates
    env_file:
      - .env                   # all secrets come from .env (NeonDB connection + JWT secret)
    restart: unless-stopped
