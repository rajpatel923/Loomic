name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (GCC 14, Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 ninja-build \
            libssl-dev zlib1g-dev libpq-dev \
            pkg-config

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-ubuntu-24.04-gcc14-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-ubuntu-24.04-gcc14-

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure (debug)
        env:
          CC:  gcc-14
          CXX: g++-14
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug --parallel

      - name: Test
        run: ctest --preset debug --output-on-failure

  asan:
    name: ASan (Clang 17, Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 ninja-build \
            libssl-dev zlib1g-dev libpq-dev \
            pkg-config

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-ubuntu-24.04-clang17-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-ubuntu-24.04-clang17-

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure (debug-asan)
        env:
          CC:  clang-17
          CXX: clang++-17
        run: cmake --preset debug-asan

      - name: Build
        run: cmake --build --preset debug-asan --parallel

      - name: Test
        env:
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
        run: ctest --preset debug-asan --output-on-failure

  tsan:
    name: TSan (Clang 17, Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 ninja-build \
            libssl-dev zlib1g-dev libpq-dev \
            pkg-config

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-ubuntu-24.04-clang17-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-ubuntu-24.04-clang17-

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure (debug-tsan)
        env:
          CC:  clang-17
          CXX: clang++-17
        run: cmake --preset debug-tsan

      - name: Build
        run: cmake --build --preset debug-tsan --parallel

      - name: Test
        env:
          TSAN_OPTIONS: "halt_on_error=1:suppressions=tsan_suppressions.txt"
        run: ctest --preset debug-tsan --output-on-failure
